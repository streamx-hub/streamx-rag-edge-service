quarkus.otel.traces.exporter=none

# --- Datasource (PostgreSQL + pgvector) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=raguser
quarkus.datasource.password=ragpass
quarkus.datasource.jdbc.url=${STREAMX_POSTGRES_URL}
quarkus.datasource.jdbc.acquisition-timeout=60S

mp.messaging.incoming.resources.connector=quarkus-http
mp.messaging.incoming.resources.deserializer=com.streamx.reactive.messaging.http.CloudEventJsonDeserializer
mp.messaging.incoming.resources.path=/resources
mp.messaging.incoming.resources.protocolVersion=HTTP_2
mp.messaging.incoming.resources.twoPhaseResponseFlow=true


streamx.url-include-replacement-provider=SsiInclude
streamx.experimental.openai-rag-sink.html-resource-types=\
com.streamx.blueprints.page.published.v1,\
com.streamx.blueprints.page.unpublished.v1,\
com.streamx.blueprints.fragment.published.v1,\
com.streamx.blueprints.fragment.unpublished.v1

# --- Hibernate ORM (chat_profiles table) ---
# "update" creates the table on first boot and applies non-destructive changes.
# Switch to "validate" once the schema is stable in production.
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# --- OpenAI ---
quarkus.langchain4j.openai.api-key=${STREAMX_OPENAI_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o
quarkus.langchain4j.openai.chat-model.temperature=0.3
quarkus.langchain4j.openai.embedding-model.model-name=text-embedding-3-small

# --- Chat Memory ---
# Keeps the last 20 messages (10 user + 10 assistant turns) per sessionId.
# The frontend sends a stable sessionId in each request, so follow-up questions
# within the same browser tab share context automatically.
quarkus.langchain4j.chat-memory.type=MESSAGE_WINDOW
quarkus.langchain4j.chat-memory.memory-window.max-messages=20

# --- pgvector Embedding Store ---
quarkus.langchain4j.pgvector.dimension=1536
# Keep index disabled until you have >1000 documents; then set use-index=true
# and tune index-list-size = sqrt(total_vectors), e.g. 100 for 10k docs.
quarkus.langchain4j.pgvector.use-index=false
# quarkus.langchain4j.pgvector.index-list-size=100