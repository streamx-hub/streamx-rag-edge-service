default:
  environment:
    STREAMX_BLUEPRINTS_KEY_VALUE_STATE_REPOSITORY_BACKEND: rocksdb
    STREAMX_BLUEPRINTS_KEY_VALUE_STATE_REPOSITORY_ROCKSDB_PATH: /var/lib/rocksdb

descriptors:
  relay:
    type: processing
    containers:
      service:
        incoming:
          events: {}
        outgoing:
          relayed-events: {}

  openai-rag-sink:
    type: edge
    volumes:
      pgdata:
        size: 20Gi
        persistent: true
    containers:
      sink:
        image: ghcr.io/streamx-com/streamx-blueprints/openai-rag-sink:latest-jvm
        incoming:
          resources:
            initState: delta
        servicePorts:
          - 8083:8080
      postgres:
        image: pgvector/pgvector:pg17
        servicePorts:
          - 5432:5432
        volumes:
          - pgdata:/var/lib/postgresql/data

networking:
  httpRoutes:
    ingestion-route:
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: ingestion/rest-ingestion
              port: 8080
    openai-rag-route:
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: edge/openai-rag-sink
              port: 8083

sources:
  cli:
    outgoing:
      - ref: inbox.data
        produces:
          - com.streamx.blueprints.data.published.v1
          - com.streamx.blueprints.data.unpublished.v1


ingestion:
  rest-ingestion:
    containers:
      proxy:
        environment:
          STREAMX_SOURCES_CLI_ACCEPT_IAT_FROM: "1704067200"


processing:
  data-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.data
        outgoing:
          relayed-events:
            ref: outbox.data

edge:
  openai-rag-sink:
    descriptor: openai-rag-sink
    containers:
      sink:
        incoming:
          resources:
            ref: outbox.data
        environment:
          QUARKUS_LOG_LEVEL: TRACE
          QUARKUS_LOG_MIN_LEVEL: TRACE
      postgres:
        environment:
          POSTGRES_DB:       ragdb
          POSTGRES_USER:     raguser
          POSTGRES_PASSWORD: ragpass
        volumesFrom:
          configs:
            - postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

