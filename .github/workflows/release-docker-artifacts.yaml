name: 'Release: Docker Artifacts'

on:
  workflow_dispatch:

permissions:
  id-token: write
  packages: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the GH Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email "github.actions@streamx.hub"
          git config --global user.name "${GITHUB_ACTOR}"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_SECRET_KEY }}" > ~/.ssh/id_rsa
          chmod 0600 ~/.ssh/id_rsa

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'adopt'
          cache: 'maven'

      - name: Release verify
        run: ./mvnw -B verify

      - name: Release prepare
        run: ./mvnw -B release:prepare -Darguments="-DskipTests"

      - name: Release perform
        run: |
          ./mvnw -B release:perform -P container-image-multiplatform,release \
            -Darguments="-DskipTests -Dquarkus.container-image.push=true"